name: Upload Python Package to Test PyPI

on:
  workflow_run:
    workflows: ["Build Wheels"]
    types: [completed]

permissions:
  contents: read

jobs:
  pypi-publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download wheels from release
        run: |
          # Determine tag from the triggering workflow run (head_branch when triggered by a tag or branch)
          TAG=${{ github.event.workflow_run.head_branch || github.event.workflow_run.head_sha }}
          gh release download "$TAG" --dir dist/ --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/